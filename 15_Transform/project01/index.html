<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        width: 100%;
      }

      .main {
        height: 100%;
        width: 100%;
        background-color: blanchedalmond;

        display: flex;
        align-items: center;
        justify-content: center;
      }

      .main button {
        padding: 10px 20px;
        border: 1px solid orange;
        border-radius: 20px;
        font-size: 16px;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        z-index: 1;
      }

      button::before {
        content: "";
        height: 100%;
        width: 100%;
        position: absolute;
        background-color: aquamarine;
        top: 0;
        left: 0;

        transform: translateX(-100%);

        transition-property: all;
        transition-duration: 0.3s;
        transition-timing-function: linear;
        z-index: -1;
      }

      button:hover::before {
        transform: translateX(0);
      }
    </style>
  </head>
  <body>
    <div class="main">
      <button>Hover Me</button>
    </div>
  </body>
</html>
