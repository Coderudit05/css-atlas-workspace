<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        width: 100%;
      }

      body{
        display: flex;
        align-items: center;
        justify-content: center;

      }

      .box {
        height: 400px;
        width: 400px;
        background-color: aquamarine;

        transform: rotate(45deg);
      }
    </style>
  </head>
  <body>
    <div class="box">Hello I am box</div>
  </body>
</html>
