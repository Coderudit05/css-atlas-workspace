<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Adding Font awesome CDN -->
    <script
      src="https://kit.fontawesome.com/f12c1313f0.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <!-- Navbar -->
    <header class="navbar">
      <div class="container nav-wrapper">
        <h2 class="logo">Etech.</h2>

        <nav class="nav-links">
          <a href="#">Courses</a>
          <a href="#">Teachers</a>
          <a href="#">Offers</a>
          <a href="#">Contact</a>
        </nav>

        <div class="nav-buttons">
          <button class="btn-outline">Sign In</button>
          <button class="btn-primary">Free Trial</button>
        </div>

        <div class="menu-icon">
          <i class="fas fa-bars"></i>
        </div>
      </div>
    </header>

    <section class="hero">
      <div class="container hero-wrapper">
        <!-- Left Content -->

        <div class="hero-left">
          <h1>Develop your skills in a new and unique way</h1>
          <p>
            Explore a transformative approach to skill development on our online
            learning platform.
          </p>
          <div class="hero-buttons">
            <button class="btn-primary">Enroll Now</button>
            <button class="btn-secondary">What's Etech?</button>
          </div>
        </div>
        <!-- Right Content -->
        <div class="right-content">
            <div class="hero-image">
                <img src="./assets/hero-image.png" alt="">
            </div>
        </div>
      </div>
    </section>
  </body>
</html>
