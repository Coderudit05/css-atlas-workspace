<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,body{
            height: 100%;
        }

        body{
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1{
            padding: 50px;
        }

        /* h1::before{
            content: '"';
        } */

        h1::before{
            content: '';
        }

        button{
            border: none;
            background-color: transparent;
            cursor: pointer;
            position: relative;
        }

        button::before{
            content: '';
            height: 2px;
            width: 80%;
            background-color: brown;
            position: absolute;

            bottom: 0;
            left: 10%;
        }

    </style>
</head>
<body>
    <!-- <h1>Hello I am Udit Namdev</h1> -->


    <button>Hover me</button>

    
</body>
</html>
