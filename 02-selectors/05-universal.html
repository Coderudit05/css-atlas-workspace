<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        *{
            color: green;
        }

        div{
            color: blue;
        }
        
        .abc{
            color: yellowgreen;
        }
        #box{
            color: orange;
        }

    </style>
</head>
<body>

    <h1 class="abc">Hello I am h1</h1>
    <h2>Hello I am h2</h2>
    <h3>Hello I am h3</h3>

    <div class="abc" id="box">Hello I am div</div>
    <span>Hello I am span</span>

    <a href="">Hello I am a tag</a>
    
</body>
</html>
