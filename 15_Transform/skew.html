<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        width: 100%;
      }

      body{
        display: flex;
        align-items: center;
        justify-content: center;

      }

      .box {
        height: 200px;
        width: 200px;
        background-color: aquamarine;
        cursor: pointer;
        
        transition: all 0.3s linear;
        
      }

      .box:hover{
        transform: skewY(45deg)
      }
    </style>
  </head>
  <body>
    <div class="box"></div>
  </body>
</html>
